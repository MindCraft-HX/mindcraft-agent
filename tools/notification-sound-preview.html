<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notification Sound Preview</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      background: #111827;
      color: #e5e7eb;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    main {
      width: min(520px, calc(100vw - 32px));
      padding: 24px;
      border: 1px solid #374151;
      border-radius: 8px;
      background: #1f2937;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 18px;
      font-weight: 650;
    }
    p {
      margin: 0 0 18px;
      color: #9ca3af;
      font-size: 13px;
      line-height: 1.6;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      height: 36px;
      padding: 0 14px;
      border: 1px solid #4b5563;
      border-radius: 6px;
      background: #111827;
      color: #e5e7eb;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover {
      border-color: #38bdf8;
      color: #7dd3fc;
    }
    code {
      color: #7dd3fc;
      font-family: Consolas, monospace;
    }
  </style>
</head>
<body>
  <main>
    <h1>通知提示音试听</h1>
    <p>
      审批音：<code>1047Hz triangle 0.12s volume 0.22</code> + <code>784Hz triangle 0.18s volume 0.20</code>。<br>
      完成音：<code>880Hz -> 1175Hz sine 0.34s volume 0.21</code>。
    </p>
    <div class="actions">
      <button type="button" id="ask">等待审批 / 询问</button>
      <button type="button" id="done">任务完成</button>
      <button type="button" id="both">连续播放</button>
    </div>
  </main>

  <script>
    let audioContext = null
    let nextStartAt = 0

    function getAudioContext() {
      const AudioContextCtor = window.AudioContext || window.webkitAudioContext
      if (!audioContext || audioContext.state === 'closed') {
        audioContext = new AudioContextCtor()
      }
      return audioContext
    }

    function setGainEnvelope(gainNode, at, volume, duration) {
      gainNode.gain.cancelScheduledValues(at)
      gainNode.gain.setValueAtTime(0.0001, at)
      gainNode.gain.exponentialRampToValueAtTime(Math.max(volume, 0.0001), at + 0.01)
      gainNode.gain.exponentialRampToValueAtTime(0.0001, at + duration)
    }

    async function playToneSequence(tones) {
      const ctx = getAudioContext()
      if (ctx.state === 'suspended') await ctx.resume()

      const now = ctx.currentTime
      const startAt = Math.max(now, nextStartAt)
      let sequenceEnd = startAt

      for (const tone of tones) {
        const offset = Number(tone.offset || 0)
        const duration = Math.max(Number(tone.duration || 0.12), 0.02)
        const at = startAt + offset
        const osc = ctx.createOscillator()
        const gain = ctx.createGain()

        osc.type = tone.type || 'sine'
        osc.frequency.setValueAtTime(Number(tone.frequency || 880), at)
        if (tone.toFrequency) {
          osc.frequency.exponentialRampToValueAtTime(Number(tone.toFrequency), at + duration)
        }
        osc.connect(gain)
        gain.connect(ctx.destination)
        setGainEnvelope(gain, at, Number(tone.volume || 0.14), duration)
        osc.start(at)
        osc.stop(at + duration + 0.02)
        sequenceEnd = Math.max(sequenceEnd, at + duration)
      }

      nextStartAt = sequenceEnd + 0.04
    }

    function playAskSound() {
      return playToneSequence([
        { frequency: 1047, duration: 0.12, volume: 0.22, type: 'triangle' },
        { frequency: 784, offset: 0.15, duration: 0.18, volume: 0.2, type: 'triangle' },
      ])
    }

    function playDoneSound() {
      return playToneSequence([
        { frequency: 880, toFrequency: 1175, duration: 0.34, volume: 0.21, type: 'sine' },
      ])
    }

    document.getElementById('ask').addEventListener('click', playAskSound)
    document.getElementById('done').addEventListener('click', playDoneSound)
    document.getElementById('both').addEventListener('click', async () => {
      await playAskSound()
      await playDoneSound()
    })
  </script>
</body>
</html>
