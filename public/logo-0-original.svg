<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#409eff"/>
      <stop offset="100%" stop-color="#00acc1"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00acc1"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
  </defs>
  <!-- 六边形外框 -->
  <polygon points="128,18 222,70 222,180 128,232 34,180 34,70"
           fill="none" stroke="url(#blueGrad)" stroke-width="12" stroke-linejoin="round"/>
  <!-- 内部 G/C 形（左侧弧线） -->
  <path d="M148 80 C108 68, 68 88, 68 128 C68 168, 108 188, 148 176"
        fill="none" stroke="url(#blueGrad)" stroke-width="14" stroke-linecap="round"/>
  <!-- 右侧箭头 -->
  <path d="M178 108 L218 128 L178 148" fill="none" stroke="url(#cyanGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 中心菱形 -->
  <polygon points="128,108 148,128 128,148 108,128" fill="url(#blueGrad)" opacity="0.7"/>
</svg>
