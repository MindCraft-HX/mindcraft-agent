<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      .search-wrap {
        padding: 10px;
        background: #fff;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        border-radius: 4px;
        display: flex;
        align-items: center;
      }
      .input {
        flex: 1;
        width: 200px;
        height: 30px;
        padding-right: 10px;
        border: 0;
        outline: none;

        border-radius: 5px;
      }
      .button {
        display: inline-block;
        background: transparent;
        border: 0;
      }
      .icon {
        width: 26px;
        height: 26px;
        font-size: 26px;
        margin: 0;
        padding: 0;
        border-radius: 50%;
        position: relative;
        display: inline-block;
        vertical-align: middle;
        line-height: 1;
        flex-shrink: 0;
      }
      .icon:hover {
        background-color: #e5e2e2;
      }
      .icon.next:hover::after {
        border-color: #e5e2e2 transparent transparent transparent;
      }
      .icon.prev:hover::after {
        border-color: transparent transparent #e5e2e2 transparent;
      }
      .prev::before,
      .next::before,
      .prev::after,
      .next::after {
        content: '';
        position: absolute;
        width: 0;
        height: 0;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border-style: solid;
      }
      .prev::before {
        border-width: 0 6px 6px 6px;
        border-color: transparent transparent #000 transparent;
      }
      .prev::after {
        border-width: 0 6px 6px 6px;
        border-color: transparent transparent #fff transparent;
        transform: translate(-50%, calc(-50% + 2px));
      }
      .next::before {
        border-width: 6px 6px 0 6px;
        border-color: #000 transparent transparent transparent;
      }
      .next::after {
        border-width: 6px 6px 0 6px;
        border-color: #fff transparent transparent transparent;
        transform: translate(-50%, calc(-50% - 2px));
      }
      .count {
        display: inline-block;
        font-size: 12px;
        margin-right: 6px;
        flex-shrink: 0;
        max-width: 50px;
      }
    </style>
  </head>
  <body>
    <div class="search-wrap">
      <input id="search" class="input" />
      <div class="count" id="count">0/0</div>
      <!-- <button class="button" id="searchBtn">搜索</button> -->
      <button class="button icon prev" id="prev"></button>
      <button class="button icon next" id="next"></button>
      <button class="button icon" id="close">&times;</button>
    </div>
    <script>
      window.onload = () => {
        postMessage({ payload: 'removeLoading' }, '*')
        document.getElementById('search').focus()

        document.getElementById('search').oninput = () => {
          const value = document.getElementById('search').value
          if (!value) return
          electronAPI.sendSearchPage(JSON.stringify({ value, start: true }))
        }
        document.getElementById('prev').onclick = () => {
          const value = document.getElementById('search').value
          if (!value) return
          electronAPI.sendSearchPage(JSON.stringify({ value, next: false }))
        }
        document.getElementById('next').onclick = () => {
          const value = document.getElementById('search').value
          if (!value) return
          electronAPI.sendSearchPage(JSON.stringify({ value, next: true }))
        }
        document.getElementById('close').onclick = () => {
          electronAPI.closeSearchPage()
        }

        window.addEventListener('keyup', (e) => {
          if (e.key === 'Escape') {
            electronAPI.closeSearchPage()
          } else if (e.key === 'Enter') {
            if(e.shiftKey) {
              document.getElementById('prev').click()
            } else {
              document.getElementById('next').click()
            }
          } else if (e.key === 'ArrowRight') {
            document.getElementById('next').click()
          } else if (e.key === 'ArrowLeft') {
            document.getElementById('prev').click()
          }
        })

        setTimeout(() => {
          electronAPI.foundInPage((arg) => {
            document.getElementById('count').innerText = `${arg.activeMatchOrdinal}/${arg.matches}`
          })
        }, 0);
      }
    </script>
  </body>
</html>
